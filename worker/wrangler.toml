name = "pshatgpt-proxy"
main = "src/index.js"
compatibility_date = "2024-10-01"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[[kv_namespaces]]
binding = "PSHATGPT"
id = "d00e1ca559124da0b3c506c41112afc8"

[vars]
# Per-device (UUID) daily cap for normal explanations.
DEVICE_DAILY = "10"
# Per-device LIFETIME cap for Iyun (research) mode — never resets.
IYUN_LIFETIME = "2"
# Per-IP daily cap — safety net. Iyun counts 5x because it costs ~10x.
FREE_TIER_DAILY = "25"
# Comma-separated allowed origins. "*" lets anyone call your worker.
ALLOWED_ORIGINS = "https://pshatgpt.com,https://www.pshatgpt.com,https://ys770.github.io"

# Secret (set via `wrangler secret put ANTHROPIC_API_KEY`):
#   ANTHROPIC_API_KEY
